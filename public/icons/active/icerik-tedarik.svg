<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" width="512" height="512">
<defs>
  <clipPath id="rnd"><rect width="512" height="512" rx="110"/></clipPath>
  <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="sglow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="pool" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="28"/>
  </filter>
</defs>
<g clip-path="url(#rnd)">
  <rect width="512" height="512" fill="#0e0a04"/>
  <line x1="0" y1="0" x2="512" y2="0" stroke="#301a0a" stroke-width="0.7" opacity="0.4"/><line x1="0" y1="36" x2="512" y2="36" stroke="#301a0a" stroke-width="0.7" opacity="0.4"/><line x1="0" y1="72" x2="512" y2="72" stroke="#301a0a" stroke-width="0.7" opacity="0.4"/><line x1="0" y1="108" x2="512" y2="108" stroke="#301a0a" stroke-width="0.7" opacity="0.4"/><line x1="0" y1="144" x2="512" y2="144" stroke="#301a0a" stroke-width="0.7" opacity="0.4"/><line x1="0" y1="180" x2="512" y2="180" stroke="#301a0a" stroke-width="0.7" opacity="0.4"/><line x1="0" y1="216" x2="512" y2="216" stroke="#301a0a" stroke-width="0.7" opacity="0.4"/><line x1="0" y1="252" x2="512" y2="252" stroke="#301a0a" stroke-width="0.7" opacity="0.4"/><line x1="0" y1="288" x2="512" y2="288" stroke="#301a0a" stroke-width="0.7" opacity="0.4"/><line x1="0" y1="324" x2="512" y2="324" stroke="#301a0a" stroke-width="0.7" opacity="0.4"/><line x1="0" y1="360" x2="512" y2="360" stroke="#301a0a" stroke-width="0.7" opacity="0.4"/><line x1="0" y1="396" x2="512" y2="396" stroke="#301a0a" stroke-width="0.7" opacity="0.4"/><line x1="0" y1="432" x2="512" y2="432" stroke="#301a0a" stroke-width="0.7" opacity="0.4"/><line x1="0" y1="468" x2="512" y2="468" stroke="#301a0a" stroke-width="0.7" opacity="0.4"/><line x1="0" y1="504" x2="512" y2="504" stroke="#301a0a" stroke-width="0.7" opacity="0.4"/><line x1="0" y1="0" x2="0" y2="512" stroke="#301a0a" stroke-width="0.7" opacity="0.4"/><line x1="36" y1="0" x2="36" y2="512" stroke="#301a0a" stroke-width="0.7" opacity="0.4"/><line x1="72" y1="0" x2="72" y2="512" stroke="#301a0a" stroke-width="0.7" opacity="0.4"/><line x1="108" y1="0" x2="108" y2="512" stroke="#301a0a" stroke-width="0.7" opacity="0.4"/><line x1="144" y1="0" x2="144" y2="512" stroke="#301a0a" stroke-width="0.7" opacity="0.4"/><line x1="180" y1="0" x2="180" y2="512" stroke="#301a0a" stroke-width="0.7" opacity="0.4"/><line x1="216" y1="0" x2="216" y2="512" stroke="#301a0a" stroke-width="0.7" opacity="0.4"/><line x1="252" y1="0" x2="252" y2="512" stroke="#301a0a" stroke-width="0.7" opacity="0.4"/><line x1="288" y1="0" x2="288" y2="512" stroke="#301a0a" stroke-width="0.7" opacity="0.4"/><line x1="324" y1="0" x2="324" y2="512" stroke="#301a0a" stroke-width="0.7" opacity="0.4"/><line x1="360" y1="0" x2="360" y2="512" stroke="#301a0a" stroke-width="0.7" opacity="0.4"/><line x1="396" y1="0" x2="396" y2="512" stroke="#301a0a" stroke-width="0.7" opacity="0.4"/><line x1="432" y1="0" x2="432" y2="512" stroke="#301a0a" stroke-width="0.7" opacity="0.4"/><line x1="468" y1="0" x2="468" y2="512" stroke="#301a0a" stroke-width="0.7" opacity="0.4"/><line x1="504" y1="0" x2="504" y2="512" stroke="#301a0a" stroke-width="0.7" opacity="0.4"/>
  <ellipse cx="256" cy="510" rx="220" ry="100" fill="#e0a040" filter="url(#pool)" opacity="0.38"/>
  <!-- Glow layer: person silhouette (left) + factory (right) -->
  <g filter="url(#glow)">
    <!-- Person silhouette -->
    <circle cx="170" cy="200" r="48" fill="#e0a040" opacity="0.95"/>
    <ellipse cx="170" cy="340" rx="60" ry="80" fill="#e0a040" opacity="0.95"/>
    <!-- Factory building -->
    <rect x="310" y="220" width="140" height="190" rx="6" fill="#e0a040" opacity="0.95"/>
    <rect x="320" y="160" width="30" height="60" rx="3" fill="#e0a040" opacity="0.95"/>
    <rect x="360" y="180" width="30" height="40" rx="3" fill="#e0a040" opacity="0.95"/>
    <rect x="400" y="140" width="30" height="80" rx="3" fill="#e0a040" opacity="0.95"/>
    <!-- Factory windows -->
    <rect x="330" y="270" width="30" height="30" rx="3" fill="#0e0a04" opacity="0.6"/>
    <rect x="375" y="270" width="30" height="30" rx="3" fill="#0e0a04" opacity="0.6"/>
    <rect x="330" y="320" width="30" height="30" rx="3" fill="#0e0a04" opacity="0.6"/>
    <rect x="375" y="320" width="30" height="30" rx="3" fill="#0e0a04" opacity="0.6"/>
    <!-- Accent dots -->
    <circle cx="170" cy="150" r="11" fill="#ffe0a0"/>
    <circle cx="270" cy="260" r="11" fill="#ffe0a0"/>
    <circle cx="380" cy="130" r="13" fill="#ffe0a0"/>
    <!-- Dashed polyline connecting elements -->
    <polyline points="170,150 270,260 380,130" fill="none" stroke="#ffe0a0" stroke-width="4" stroke-dasharray="12 8" stroke-linecap="round"/>
    <!-- Connection line -->
    <line x1="230" y1="300" x2="310" y2="300" stroke="#e0a040" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- Detail layer -->
  <g filter="url(#sglow)">
    <!-- Person silhouette -->
    <circle cx="170" cy="200" r="48" fill="#f0b050" opacity="0.9"/>
    <ellipse cx="170" cy="340" rx="60" ry="80" fill="#f0b050" opacity="0.9"/>
    <!-- Factory building -->
    <rect x="310" y="220" width="140" height="190" rx="6" fill="#f0b050" opacity="0.9"/>
    <rect x="320" y="160" width="30" height="60" rx="3" fill="#f0b050" opacity="0.9"/>
    <rect x="360" y="180" width="30" height="40" rx="3" fill="#f0b050" opacity="0.9"/>
    <rect x="400" y="140" width="30" height="80" rx="3" fill="#f0b050" opacity="0.9"/>
    <!-- Factory windows -->
    <rect x="330" y="270" width="30" height="30" rx="3" fill="#0e0a04" opacity="0.5"/>
    <rect x="375" y="270" width="30" height="30" rx="3" fill="#0e0a04" opacity="0.5"/>
    <rect x="330" y="320" width="30" height="30" rx="3" fill="#0e0a04" opacity="0.5"/>
    <rect x="375" y="320" width="30" height="30" rx="3" fill="#0e0a04" opacity="0.5"/>
    <!-- Accent dots (detail) -->
    <circle cx="170" cy="150" r="8" fill="#fff0d0"/>
    <circle cx="270" cy="260" r="8" fill="#fff0d0"/>
    <circle cx="380" cy="130" r="10" fill="#fff0d0"/>
    <!-- Dashed polyline (detail) -->
    <polyline points="170,150 270,260 380,130" fill="none" stroke="#fff0d0" stroke-width="2.5" stroke-dasharray="10 6" stroke-linecap="round"/>
    <!-- Connection line -->
    <line x1="230" y1="300" x2="310" y2="300" stroke="#f0b050" stroke-width="3" stroke-linecap="round"/>
  </g>
</g>
</svg>