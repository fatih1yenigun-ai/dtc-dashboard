<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
<defs>
  <clipPath id="rnd"><rect width="512" height="512" rx="110"/></clipPath>
  <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="sglow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="pool" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="28"/>
  </filter>
</defs>
<g clip-path="url(#rnd)">
  <rect width="512" height="512" fill="#08081c"/>
  <line x1="0" y1="0" x2="512" y2="0" stroke="#141040" stroke-width="0.7" opacity="0.4"/>
  <line x1="0" y1="38" x2="512" y2="38" stroke="#141040" stroke-width="0.7" opacity="0.4"/>
  <line x1="0" y1="76" x2="512" y2="76" stroke="#141040" stroke-width="0.7" opacity="0.4"/>
  <line x1="0" y1="114" x2="512" y2="114" stroke="#141040" stroke-width="0.7" opacity="0.4"/>
  <line x1="0" y1="152" x2="512" y2="152" stroke="#141040" stroke-width="0.7" opacity="0.4"/>
  <line x1="0" y1="190" x2="512" y2="190" stroke="#141040" stroke-width="0.7" opacity="0.4"/>
  <line x1="0" y1="228" x2="512" y2="228" stroke="#141040" stroke-width="0.7" opacity="0.4"/>
  <line x1="0" y1="266" x2="512" y2="266" stroke="#141040" stroke-width="0.7" opacity="0.4"/>
  <line x1="0" y1="304" x2="512" y2="304" stroke="#141040" stroke-width="0.7" opacity="0.4"/>
  <line x1="0" y1="342" x2="512" y2="342" stroke="#141040" stroke-width="0.7" opacity="0.4"/>
  <line x1="0" y1="380" x2="512" y2="380" stroke="#141040" stroke-width="0.7" opacity="0.4"/>
  <line x1="0" y1="418" x2="512" y2="418" stroke="#141040" stroke-width="0.7" opacity="0.4"/>
  <line x1="0" y1="456" x2="512" y2="456" stroke="#141040" stroke-width="0.7" opacity="0.4"/>
  <line x1="0" y1="494" x2="512" y2="494" stroke="#141040" stroke-width="0.7" opacity="0.4"/>
  <ellipse cx="256" cy="510" rx="220" ry="100" fill="#3028c0" filter="url(#pool)" opacity="0.38"/>
  <g filter="url(#glow)">
    <g fill="none" stroke="#4038d8" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
      <!-- main factory floor -->
      <rect x="100" y="290" width="312" height="136" rx="6"/>
      <!-- left upper wing -->
      <rect x="100" y="232" width="116" height="58" rx="4"/>
      <!-- right control room -->
      <rect x="288" y="212" width="124" height="78" rx="4"/>
      <!-- left chimney (connects to left wing top at y=232) -->
      <rect x="128" y="162" width="28" height="70" rx="3"/>
      <!-- right chimney (connects to right control top at y=212) -->
      <rect x="348" y="162" width="28" height="50" rx="3"/>
    </g>
    <!-- windows: main floor -->
    <rect x="124" y="314" width="28" height="22" rx="3" fill="none" stroke="#4038d8" stroke-width="2.2" opacity="0.6"/>
    <rect x="168" y="314" width="28" height="22" rx="3" fill="none" stroke="#4038d8" stroke-width="2.2" opacity="0.6"/>
    <rect x="220" y="314" width="28" height="22" rx="3" fill="none" stroke="#4038d8" stroke-width="2.2" opacity="0.5"/>
    <rect x="302" y="314" width="28" height="22" rx="3" fill="none" stroke="#4038d8" stroke-width="2.2" opacity="0.5"/>
    <rect x="352" y="314" width="28" height="22" rx="3" fill="none" stroke="#4038d8" stroke-width="2.2" opacity="0.5"/>
    <!-- windows: upper wings -->
    <rect x="116" y="248" width="24" height="20" rx="3" fill="none" stroke="#4038d8" stroke-width="2" opacity="0.55"/>
    <rect x="154" y="248" width="24" height="20" rx="3" fill="none" stroke="#4038d8" stroke-width="2" opacity="0.55"/>
    <rect x="302" y="228" width="24" height="20" rx="3" fill="none" stroke="#4038d8" stroke-width="2" opacity="0.5"/>
    <rect x="346" y="228" width="24" height="20" rx="3" fill="none" stroke="#4038d8" stroke-width="2" opacity="0.5"/>
    <rect x="390" y="228" width="18" height="20" rx="3" fill="none" stroke="#4038d8" stroke-width="2" opacity="0.45"/>
    <!-- main gate -->
    <rect x="218" y="356" width="76" height="70" rx="4" fill="none" stroke="#4038d8" stroke-width="2.5" opacity="0.7"/>
  </g>
  <g filter="url(#sglow)">
    <g fill="none" stroke="#6858f8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="100" y="290" width="312" height="136" rx="6"/>
      <rect x="100" y="232" width="116" height="58" rx="4"/>
      <rect x="288" y="212" width="124" height="78" rx="4"/>
      <rect x="128" y="162" width="28" height="70" rx="3"/>
      <rect x="348" y="162" width="28" height="50" rx="3"/>
    </g>
    <!-- smoke rings left chimney (cx=142) -->
    <circle cx="142" cy="150" r="10" fill="none" stroke="#9080ff" stroke-width="1.8" opacity="0.85"/>
    <circle cx="138" cy="130" r="15" fill="none" stroke="#9080ff" stroke-width="1.5" opacity="0.62"/>
    <circle cx="134" cy="108" r="20" fill="none" stroke="#9080ff" stroke-width="1.2" opacity="0.38"/>
    <!-- smoke rings right chimney (cx=362) -->
    <circle cx="362" cy="150" r="10" fill="none" stroke="#9080ff" stroke-width="1.8" opacity="0.85"/>
    <circle cx="358" cy="130" r="15" fill="none" stroke="#9080ff" stroke-width="1.5" opacity="0.62"/>
    <circle cx="354" cy="108" r="20" fill="none" stroke="#9080ff" stroke-width="1.2" opacity="0.38"/>
  </g>
</g>
</svg>