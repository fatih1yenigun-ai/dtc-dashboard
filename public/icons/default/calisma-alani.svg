<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
<defs>
  <clipPath id="rnd"><rect width="512" height="512" rx="110"/></clipPath>
  <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="sglow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="pool" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="28"/>
  </filter>
</defs>
<g clip-path="url(#rnd)">
  <rect width="512" height="512" fill="#160010"/>
  <line x1="0" y1="0" x2="0" y2="512" stroke="#350028" stroke-width="0.7" opacity="0.4"/>
  <line x1="38" y1="0" x2="38" y2="512" stroke="#350028" stroke-width="0.7" opacity="0.4"/>
  <line x1="76" y1="0" x2="76" y2="512" stroke="#350028" stroke-width="0.7" opacity="0.4"/>
  <line x1="114" y1="0" x2="114" y2="512" stroke="#350028" stroke-width="0.7" opacity="0.4"/>
  <line x1="152" y1="0" x2="152" y2="512" stroke="#350028" stroke-width="0.7" opacity="0.4"/>
  <line x1="190" y1="0" x2="190" y2="512" stroke="#350028" stroke-width="0.7" opacity="0.4"/>
  <line x1="228" y1="0" x2="228" y2="512" stroke="#350028" stroke-width="0.7" opacity="0.4"/>
  <line x1="266" y1="0" x2="266" y2="512" stroke="#350028" stroke-width="0.7" opacity="0.4"/>
  <line x1="304" y1="0" x2="304" y2="512" stroke="#350028" stroke-width="0.7" opacity="0.4"/>
  <line x1="342" y1="0" x2="342" y2="512" stroke="#350028" stroke-width="0.7" opacity="0.4"/>
  <line x1="380" y1="0" x2="380" y2="512" stroke="#350028" stroke-width="0.7" opacity="0.4"/>
  <line x1="418" y1="0" x2="418" y2="512" stroke="#350028" stroke-width="0.7" opacity="0.4"/>
  <line x1="456" y1="0" x2="456" y2="512" stroke="#350028" stroke-width="0.7" opacity="0.4"/>
  <line x1="494" y1="0" x2="494" y2="512" stroke="#350028" stroke-width="0.7" opacity="0.4"/>
  <ellipse cx="256" cy="510" rx="220" ry="100" fill="#b01878" filter="url(#pool)" opacity="0.38"/>
  <g filter="url(#glow)">
    <g fill="none" stroke="#cc2090" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
      <!-- bag body -->
      <rect x="100" y="182" width="312" height="208" rx="14"/>
      <!-- handle arch: left=192 right=320, center=256 ✓ -->
      <path d="M192,182 C192,122 320,122 320,182"/>
      <!-- opening / divider line -->
      <line x1="100" y1="256" x2="412" y2="256"/>
      <!-- center clasp centered at (256,256) -->
      <rect x="230" y="238" width="52" height="36" rx="10"/>
    </g>
  </g>
  <g filter="url(#sglow)">
    <g fill="none" stroke="#f040b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="100" y="182" width="312" height="208" rx="14"/>
      <path d="M192,182 C192,122 320,122 320,182"/>
      <line x1="100" y1="256" x2="412" y2="256"/>
      <rect x="230" y="238" width="52" height="36" rx="10"/>
    </g>
    <!-- laptop/tablet in top compartment (y=182–256) -->
    <rect x="152" y="198" width="208" height="32" rx="5" fill="none" stroke="#ff78d8" stroke-width="1.8" opacity="0.6"/>
    <!-- small screen line detail -->
    <line x1="168" y1="210" x2="344" y2="210" stroke="#ff78d8" stroke-width="1.2" opacity="0.45"/>
    <!-- content lines in lower compartment (y=256–390) -->
    <line x1="132" y1="284" x2="380" y2="284" stroke="#ff78d8" stroke-width="1.6" opacity="0.62"/>
    <line x1="132" y1="306" x2="356" y2="306" stroke="#ff78d8" stroke-width="1.5" opacity="0.5"/>
    <line x1="132" y1="328" x2="364" y2="328" stroke="#ff78d8" stroke-width="1.5" opacity="0.42"/>
    <line x1="132" y1="350" x2="344" y2="350" stroke="#ff78d8" stroke-width="1.4" opacity="0.32"/>
    <!-- keyhole detail on clasp -->
    <circle cx="256" cy="254" r="7" fill="none" stroke="#ff78d8" stroke-width="1.5" opacity="0.55"/>
  </g>
</g>
</svg>