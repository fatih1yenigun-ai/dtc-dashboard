<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
<defs>
  <clipPath id="rnd"><rect width="512" height="512" rx="110"/></clipPath>
  <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="sglow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="pool" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="28"/>
  </filter>
</defs>
<g clip-path="url(#rnd)">
  <rect width="512" height="512" fill="#120c00"/>
  <line x1="-100" y1="0" x2="612" y2="712" stroke="#3a2600" stroke-width="0.7" opacity="0.35"/>
  <line x1="-62" y1="0" x2="650" y2="712" stroke="#3a2600" stroke-width="0.7" opacity="0.35"/>
  <line x1="-24" y1="0" x2="688" y2="712" stroke="#3a2600" stroke-width="0.7" opacity="0.35"/>
  <line x1="14" y1="0" x2="726" y2="712" stroke="#3a2600" stroke-width="0.7" opacity="0.35"/>
  <line x1="52" y1="0" x2="764" y2="712" stroke="#3a2600" stroke-width="0.7" opacity="0.35"/>
  <line x1="90" y1="0" x2="802" y2="712" stroke="#3a2600" stroke-width="0.7" opacity="0.35"/>
  <line x1="128" y1="0" x2="840" y2="712" stroke="#3a2600" stroke-width="0.7" opacity="0.35"/>
  <line x1="166" y1="0" x2="878" y2="712" stroke="#3a2600" stroke-width="0.7" opacity="0.35"/>
  <line x1="204" y1="0" x2="916" y2="712" stroke="#3a2600" stroke-width="0.7" opacity="0.35"/>
  <line x1="242" y1="0" x2="954" y2="712" stroke="#3a2600" stroke-width="0.7" opacity="0.35"/>
  <line x1="280" y1="0" x2="992" y2="712" stroke="#3a2600" stroke-width="0.7" opacity="0.35"/>
  <line x1="318" y1="0" x2="1030" y2="712" stroke="#3a2600" stroke-width="0.7" opacity="0.35"/>
  <line x1="356" y1="0" x2="1068" y2="712" stroke="#3a2600" stroke-width="0.7" opacity="0.35"/>
  <line x1="394" y1="0" x2="1106" y2="712" stroke="#3a2600" stroke-width="0.7" opacity="0.35"/>
  <line x1="432" y1="0" x2="1144" y2="712" stroke="#3a2600" stroke-width="0.7" opacity="0.35"/>
  <line x1="470" y1="0" x2="1182" y2="712" stroke="#3a2600" stroke-width="0.7" opacity="0.35"/>
  <line x1="508" y1="0" x2="1220" y2="712" stroke="#3a2600" stroke-width="0.7" opacity="0.35"/>
  <line x1="546" y1="0" x2="1258" y2="712" stroke="#3a2600" stroke-width="0.7" opacity="0.35"/>
  <ellipse cx="256" cy="510" rx="220" ry="100" fill="#b88010" filter="url(#pool)" opacity="0.38"/>
  <g filter="url(#glow)">
    <g fill="none" stroke="#c89010" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
      <!-- diamond cap body, all points symmetric around x=256 -->
      <polygon points="256,130 382,192 256,254 130,192"/>
      <!-- flat brim -->
      <rect x="122" y="185" width="268" height="15" rx="3"/>
      <!-- tassel cord -->
      <line x1="382" y1="192" x2="382" y2="296"/>
      <!-- tassel end -->
      <circle cx="382" cy="309" r="13"/>
      <!-- head silhouette -->
      <circle cx="256" cy="338" r="52"/>
    </g>
    <!-- tassel anchor at brim corner -->
    <circle cx="382" cy="192" r="7" fill="#c89010" opacity="0.5"/>
  </g>
  <g filter="url(#sglow)">
    <g fill="none" stroke="#f0c030" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="256,130 382,192 256,254 130,192"/>
      <rect x="122" y="185" width="268" height="15" rx="3"/>
      <line x1="382" y1="192" x2="382" y2="296"/>
      <circle cx="382" cy="309" r="13"/>
      <circle cx="256" cy="338" r="52"/>
    </g>
    <!-- subtle cap-center highlight -->
    <circle cx="256" cy="192" r="10" fill="#ffd860" opacity="0.3"/>
    <!-- tassel anchor highlight -->
    <circle cx="382" cy="192" r="5" fill="#ffd860" opacity="0.65"/>
  </g>
</g>
</svg>